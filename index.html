<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResqNet — Disaster Relief Operations</title>
    <meta name="description" content="Real-time disaster relief tracking and rescue team coordination dashboard for emergency control rooms." />
    <meta name="author" content="RescueTrack" />

    <meta property="og:title" content="RescueTrack — Disaster Relief Operations" />
    <meta property="og:description" content="Real-time tracking of rescue teams, vehicles, incidents, and alerts." />
    <meta property="og:type" content="website" />


  </head>

  <body>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        const errDiv = document.createElement('div');
        errDiv.style.position = 'fixed';
        errDiv.style.top = '0';
        errDiv.style.left = '0';
        errDiv.style.width = '100%';
        errDiv.style.background = 'red';
        errDiv.style.color = 'white';
        errDiv.style.padding = '20px';
        errDiv.style.zIndex = '999999';
        errDiv.innerHTML = `<h3>Global Error</h3><p>${message}</p><p>${source}:${lineno}:${colno}</p><pre>${error?.stack}</pre>`;
        document.body.appendChild(errDiv);
      };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
